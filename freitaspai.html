<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Poppins;
    }

    body{
      background:#f7fbff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:30px;
    }

    .box{
      width:100%;
      max-width:500px;
      background:white;
      padding:40px;
      border-radius:24px;
      box-shadow:0 10px 40px rgba(0,0,0,0.08);
    }

    h1{
      margin-bottom:25px;
      color:#0f172a;
    }

    input{
      width:100%;
      padding:15px;
      border:none;
      background:#f1f5f9;
      border-radius:12px;
      margin-bottom:15px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#0ea5e9;
      color:white;
      font-weight:600;
      cursor:pointer;
      margin-bottom:15px;
    }

    .painel{
      display:none;
    }

  </style>
</head>
<body>

<div class="box" id="loginBox">

  <h1>Login Admin</h1>

  <input type="email"
  id="email"
  placeholder="Seu email">

  <input type="password"
  id="password"
  placeholder="Sua senha">

  <button onclick="login()">
    Entrar
  </button>

</div>

<div class="box painel" id="painel">

  <h1>Painel Admin</h1>

  <input type="text"
  id="titulo"
  placeholder="Nome do projeto">

  <input type="text"
  id="link"
  placeholder="Link do projeto">

  <input type="file"
  id="imagem">

  <button onclick="salvarProjeto()">
    Salvar Projeto
  </button>

  <button onclick="logout()">
    Sair
  </button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  addDoc,
  collection
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2n91JDJLDoINvYmGtHJwzZPeVB4rPZsM",
  authDomain: "freitas-web-design.firebaseapp.com",
  projectId: "freitas-web-design",
  storageBucket: "freitas-web-design.firebasestorage.app",
  messagingSenderId: "345222086620",
  appId: "1:345222086620:web:a92d7ed5615e5399c8d919",
  measurementId: "G-E230C8P0D9"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const storage = getStorage(app);

window.login = async function(){

  const email =
  document.getElementById("email").value;

  const password =
  document.getElementById("password").value;

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

  }catch(error){

    alert("Erro ao entrar");

  }

}

onAuthStateChanged(auth,(user)=>{

  if(user){

    document.getElementById("loginBox")
    .style.display = "none";

    document.getElementById("painel")
    .style.display = "block";

  }else{

    document.getElementById("loginBox")
    .style.display = "block";

    document.getElementById("painel")
    .style.display = "none";

  }

});

window.logout = async function(){

  await signOut(auth);

}

window.salvarProjeto = async function(){

  const titulo =
  document.getElementById("titulo").value;

  const link =
  document.getElementById("link").value;

  const imagem =
  document.getElementById("imagem").files[0];

  if(!imagem){

    alert("Selecione uma imagem");

    return;

  }

  try{

    const storageRef =
    ref(storage,"projetos/" + imagem.name);

    await uploadBytes(storageRef,imagem);

    const imageUrl =
    await getDownloadURL(storageRef);

    await addDoc(collection(db,"projetos"),{

      titulo,
      link,
      imagem:imageUrl,
      criadoEm:new Date()

    });

    alert("Projeto salvo!");

  }catch(error){

    console.log(error);

    alert("Erro ao salvar projeto");

  }

}

</script>

</body>
</html>
