<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Freitas Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f7fbff;
padding:30px;
color:#0f172a;
}

.login-box,
.dashboard{
max-width:1100px;
margin:auto;
background:white;
padding:40px;
border-radius:24px;
box-shadow:0 10px 40px rgba(0,0,0,0.05);
}

.dashboard{
display:none;
}

h1{
margin-bottom:30px;
}

input,
textarea{
width:100%;
padding:15px;
border:none;
background:#f1f5f9;
border-radius:14px;
margin-bottom:15px;
font-size:15px;
}

textarea{
resize:none;
min-height:120px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#0ea5e9;
color:white;
font-weight:600;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
}

.logout{
margin-top:15px;
background:#ef4444;
}

.admin-projects{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.project-card{
background:#fff;
border-radius:24px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.project-card img{
width:100%;
height:220px;
object-fit:cover;
}

.project-content{
padding:20px;
}

.project-content h3{
margin-bottom:10px;
}

.project-content p{
color:#475569;
margin-bottom:20px;
}

.project-content a{
display:inline-block;
margin-bottom:20px;
color:#0ea5e9;
text-decoration:none;
font-weight:600;
}

.delete-btn{
background:#ef4444;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
gap:20px;
}

.top-bar button{
width:auto;
padding:12px 20px;
}

@media(max-width:768px){

.top-bar{
flex-direction:column;
align-items:flex-start;
}

}

</style>

</head>
<body>

<div class="login-box" id="loginBox">

<h1>Login Admin</h1>

<input
type="email"
id="email"
placeholder="Seu email">

<input
type="password"
id="password"
placeholder="Sua senha">

<button onclick="login()">
Entrar
</button>

</div>

<div class="dashboard" id="dashboard">

<div class="top-bar">

<h1>Painel Admin</h1>

<button onclick="logout()" class="logout">
Sair
</button>

</div>

<h2 style="margin-bottom:20px;">
Criar Projeto
</h2>

<input
type="text"
id="titulo"
placeholder="Nome do projeto">

<textarea
id="descricao"
placeholder="Descrição do projeto"></textarea>

<input
type="text"
id="link"
placeholder="Link do projeto">

<input
type="file"
id="imagem">

<button onclick="salvarProjeto()">
Publicar Projeto
</button>

<div
class="admin-projects"
id="adminProjects">

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {

apiKey: "AIzaSyB2n91JDJLDoINvYmGtHJwzZPeVB4rPZsM",

authDomain: "freitas-web-design.firebaseapp.com",

projectId: "freitas-web-design",

storageBucket: "freitas-web-design.firebasestorage.app",

messagingSenderId: "345222086620",

appId: "1:345222086620:web:a92d7ed5615e5399c8d919"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const storage = getStorage(app);

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

}catch(error){

alert("Login inválido");

}

}

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("loginBox")
.style.display = "none";

document.getElementById("dashboard")
.style.display = "block";

carregarProjetos();

}else{

document.getElementById("loginBox")
.style.display = "block";

document.getElementById("dashboard")
.style.display = "none";

}

});

window.logout = async function(){

await signOut(auth);

}

window.salvarProjeto = async function(){

const titulo =
document.getElementById("titulo").value;

const descricao =
document.getElementById("descricao").value;

const link =
document.getElementById("link").value;

const imagem =
document.getElementById("imagem").files[0];

if(!imagem){

alert("Selecione uma imagem");

return;

}

try{

const storageRef =
ref(storage,"projetos/" + imagem.name);

await uploadBytes(storageRef,imagem);

const imageUrl =
await getDownloadURL(storageRef);

await addDoc(collection(db,"projetos"),{

titulo,
descricao,
link,
imagem:imageUrl,
criadoEm:new Date()

});

alert("Projeto publicado!");

location.reload();

}catch(error){

console.log(error);

alert("Erro ao publicar");

}

}

async function carregarProjetos(){

const adminProjects =
document.getElementById("adminProjects");

adminProjects.innerHTML = "";

const querySnapshot =
await getDocs(collection(db,"projetos"));

querySnapshot.forEach((project)=>{

const data = project.data();

adminProjects.innerHTML += `

<div class="project-card">

<img src="${data.imagem}">

<div class="project-content">

<h3>${data.titulo}</h3>

<p>${data.descricao}</p>

<a href="${data.link}"
target="_blank">
Ver Projeto
</a>

<button
class="delete-btn"
onclick="deletarProjeto('${project.id}')">

Excluir Projeto

</button>

</div>

</div>

`;

});

}

window.deletarProjeto = async function(id){

await deleteDoc(doc(db,"projetos",id));

location.reload();

}

</script>

</body>
</html>
